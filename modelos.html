<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modelos de Portões | Mil Serralheria</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="icon" type="image/png" href="./img/mil-serralheria-logo.png?v=2">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f8f9fa;
            color: #222;
            overflow-x: hidden;
        }

        .navbar {
            background: #fff;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.08);
            padding: 15px 0;
        }

        .navbar-brand {
            color: #198754 !important;
            font-size: 1.8rem;
            font-weight: 800;
        }

        .nav-link {
            color: #222 !important;
            font-weight: 500;
            margin-left: 15px;
        }

        .nav-link:hover {
            color: #198754 !important;
        }

        .hero {
            min-height: 55vh;
            background:
                linear-gradient(rgba(0, 0, 0, 0.65), rgba(0, 0, 0, 0.7)),
                url('https://naport.com.br/wp-content/uploads/2025/08/IMG_2869-250KB-rotated.jpg') center/cover no-repeat;

            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            padding: 80px 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
        }

        .hero p {
            margin-top: 20px;
            color: #ddd;
            font-size: 1.1rem;
            max-width: 700px;
            margin-inline: auto;
        }

        section {
            padding: 90px 0;
        }

        .section-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .section-title h2 {
            color: #198754;
            font-size: 2.8rem;
            font-weight: 800;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 22px;
            background: #fff;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: 0.4s;
        }

        .gallery-item:hover {
            transform: translateY(-8px);
        }

        .gallery-item img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
            transition: 0.4s;
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        .gallery-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.85));
            color: #fff;
        }

        .gallery-overlay h4 {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .zoom-icon {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #198754;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            z-index: 2;
        }

        .modal-content {
            background: transparent;
            border: none;
        }

        .modal-body {
            padding: 0;
            text-align: center;
        }

        .modal-body img {
            width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 15px;
        }

        .btn-close {
            position: absolute;
            right: 20px;
            top: 20px;
            background-color: #fff;
            opacity: 1;
            z-index: 999;
        }

        footer {
            background: #111;
            color: #bbb;
            text-align: center;
            padding: 35px 0;
            margin-top: 50px;
        }

        .whatsapp {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            text-decoration: none;
            font-size: 2rem;
            z-index: 999;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.25);
            transition: .3s;
        }

        .whatsapp:hover {
            transform: scale(1.08);
            color: #fff;
        }

        @media(max-width:768px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .section-title h2 {
                font-size: 2rem;
            }

            .gallery-item img {
                height: 250px;
            }
        }

        html,
        body {
            overflow-x: hidden;
            width: 100%;
            position: relative;
        }

        img,
        video,
        iframe {
            max-width: 100%;
            height: auto;
            display: block;
        }

        

        .hero,
        .gallery-item,
        .gallery-item img {
            overflow: hidden;
        }

        /* REMOVE BUG DE ZOOM NO MOBILE */
        @media (max-width:768px) {

            body {
                overflow-x: hidden;
            }

            .hero {
                background-attachment: scroll;
            }

            .gallery-item:hover {
                transform: none;
            }

            .gallery-item:hover img {
                transform: none;
            }

            .whatsapp:hover {
                transform: none;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">

            <a class="navbar-brand" href="index.html">

            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

                <span class="navbar-toggler-icon"></span>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">

                    <li class="nav-item">

    <section class="hero">

        <div class="modal-dialog modal-dialog-centered modal-xl">

                </div>

            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>

        document.addEventListener('click', function (e) {

            const item = e.target.closest('.gallery-item');

            if (!item) return;

            const img = item.querySelector('img');

            const modalImage = document.getElementById('modalImage');

            modalImage.src = img.src;

            const modal = new bootstrap.Modal(
                document.getElementById('imageModal')
            );

            modal.show();

        });

    </script>

</body>

</html>
